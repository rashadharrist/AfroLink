<!DOCTYPE html>
<html>
<head>
	<title>AfroLink - Registration</title>
	<link rel="stylesheet" type="text/css" href="styles.css"> <!-- Link to CSS file for styling -->
</head>
<body>
	<header>
		<nav>
			<!-- Navigation links can be added/modified here -->
			<a href="index.html">Home</a>
			<a href="login.html">Login</a>
		</nav>
		<!-- Search bar for businesses -->
		<input type="text" placeholder="Search for black owned businesses...">
	</header>
	<main>
		<!-- Container for registration form -->
		<div class="register-container">
			<h1>Register</h1>
			<!-- Registration form -->
			<form id="registration-form">
				<label for="email">Email:</label><br>
				<input type="email" id="email" name="email" required><br>
				<label for="password">Password:</label><br>
				<input type="password" id="password" name="password" required><br>
				<label for="confirm-password">Confirm Password:</label><br>
				<input type="password" id="confirm-password" name="confirm-password" required><br>
				<button type="submit">Register</button>
			</form>
			<!-- Error message for invalid form submission -->
			<p id="error-message" style="display:none; color:red;"></p>
		</div>
	</main>
	<script>
		// Handle form submission
		document.getElementById('registration-form').addEventListener('submit', function(event) {
			// Prevent default form submission
			event.preventDefault();
			// Get form values
			var email = document.getElementById('email').value;
			var password = document.getElementById('password').value;
			var confirmPassword = document.getElementById('confirm-password').value;
			// Validate form submission
			if (password !== confirmPassword) {
				// Show error message for mismatched passwords
				document.getElementById('error-message').textContent = 'Passwords do not match.';
				document.getElementById('error-message').style.display = 'block';
			} else {
				// Submit form data to server for registration
				// ...
				// Clear form after submission
				document.getElementById('registration-form').reset();
			}
		});
	</script>
</body>
</html>
